<!DOCTYPE html>
<html>
<head>

    <title>SkillHire Login</title>

    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h2>Candidate Login</h2>

        <form id="loginForm">
            <p id="statusMessage" style="color:#dc2626; font-size:0.95rem; min-height:1.2rem; margin-bottom:0.5rem;"></p>

            <input
                type="email"
                id="email"
                placeholder="Email"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            New User?
            <a href="register.html">
                Register
            </a>
        </p>

    </div>

</div>

<script src="./js/login.js"></script>

</body>
</html>
